services:
  postgres:
    image: postgres:16-alpine
    container_name: julius-postgres
    environment:
      POSTGRES_DB: julius
      POSTGRES_USER: julius
      POSTGRES_PASSWORD: julius
    ports:
      - "5433:5432"
    volumes:
      - julius_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U julius"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: julius-redis
    ports:
      - "6379:6379"
    volumes:
      - julius_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  julius_postgres_data:
  julius_redis_data:
