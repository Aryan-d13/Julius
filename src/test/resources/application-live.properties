# ------------------------------------------------------------------------------
# Julius AI Clipper - Live Profile Properties (Test Resources)
# ------------------------------------------------------------------------------

# Spring Database Connection (using H2 PostgreSQL compatibility fallback)
spring.datasource.url=jdbc:h2:mem:clipperdb_live;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
management.health.redis.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# Flyway database migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seed

# Spring Redis Connection configurations
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Active pipeline queue selection
clipper.queue.type=redis

# Google Gemini API key configuration (Inject in shell using GOOGLE_API_KEY env)
google.api.key=${GOOGLE_API_KEY:YOUR_GEMINI_API_KEY}
gemini.model=gemini-1.5-flash

# yt-dlp cookie files path (Optional)
youtube.cookies.path=${YOUTUBE_COOKIES_PATH:}
ytdlp.format=bestvideo[height<=720]+bestaudio/best

# Python Environment settings for Whisper
clipper.python.path=venv/Scripts/python.exe
clipper.python.env=

# Folder structures
clipper.download.dir=data/temp/downloads
clipper.convert.dir=data/temp/converted
clipper.cut.dir=data/temp/fragments
clipper.cache.dir=data/library/cache
clipper.library.video.dir=data/library/videos
clipper.library.audio.dir=data/library/audios
clipper.render.output.dir=data/jobs
