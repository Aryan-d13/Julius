# ------------------------------------------------------------------------------
# Julius — Test Profile (H2 in-memory for fast unit tests)
# ------------------------------------------------------------------------------

# H2 in PostgreSQL compatibility mode (no Docker required)
spring.datasource.url=jdbc:h2:mem:clipperdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway database migrations (runs V1 against H2)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seed

# Logging
logging.level.com.julius.clipper=DEBUG
spring.main.banner-mode=off

# Disable Redis health indicators for tests to prevent Actuator startup failure when Redis is mocked
management.health.redis.enabled=false

# Exclude reactive redis autoconfiguration because Lettuce connection factory is mocked in tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# ------------------------------------------------------------------------------
# Julius Custom Properties Defaults (Epic 4)
# ------------------------------------------------------------------------------

# Storage Configuration
clipper.storage.type=local
clipper.storage.local.root=data/storage_test
clipper.storage.gcs.bucket=

# Workspace Directory Structures
clipper.workspace.download-dir=data/temp/downloads
clipper.workspace.convert-dir=data/temp/converted
clipper.workspace.cut-dir=data/temp/fragments
clipper.workspace.cache-dir=data/library/cache
clipper.workspace.video-library-dir=data/library/videos
clipper.workspace.audio-library-dir=data/library/audios
clipper.workspace.render-output-dir=data/jobs

# Download Configuration
clipper.download.dir=data/temp/downloads
clipper.download.cookies-path=
clipper.download.format=bestvideo[height<=720]+bestaudio/best

# Queue Configuration
clipper.queue.type=db
clipper.queue.redis.host=localhost
clipper.queue.redis.port=6379
clipper.queue.redis.password=

# AI Configuration
clipper.ai.gemini-api-key=test-api-key
clipper.ai.gemini-model=gemini-1.5-flash
clipper.ai.whisper.model=large-v3-turbo
clipper.ai.whisper.python-path=python
clipper.ai.whisper.python-env=

# Telemetry Configuration
clipper.telemetry.env=test
clipper.telemetry.otlp.endpoint=http://localhost
clipper.telemetry.otlp.sampling-ratio=1.0

# Security Configuration
clipper.security.cors-enabled=false
clipper.security.allowed-origins=*

# Worker Concurrency Configurations
clipper.worker.io-concurrency-limit=8
clipper.worker.cpu-concurrency-limit=2
clipper.worker.gpu-concurrency-limit=1

