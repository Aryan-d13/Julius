# ------------------------------------------------------------------------------
# Julius AI Clipper - Live Profile Properties
# ------------------------------------------------------------------------------

# Database: inherits PostgreSQL connection from application.properties
# Override via environment variables for production:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://prod-host:5432/julius
#   SPRING_DATASOURCE_USERNAME=julius_app
#   SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.locations=classpath:db/migration

# Spring Redis Connection configurations
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Active pipeline queue selection
clipper.queue.type=redis
clipper.queue.redis.host=${REDIS_HOST:localhost}
clipper.queue.redis.port=${REDIS_PORT:6379}
clipper.queue.redis.password=${REDIS_PASSWORD:}

# AI Configuration (Inject via env in cloud runs)
clipper.ai.gemini-api-key=${GOOGLE_API_KEY:YOUR_GEMINI_API_KEY}
clipper.ai.gemini-model=gemini-1.5-flash
clipper.ai.whisper.model=large-v3-turbo
clipper.ai.whisper.python-path=venv/Scripts/python.exe
clipper.ai.whisper.python-env=

# Folder structures
clipper.workspace.download-dir=data/temp/downloads
clipper.workspace.convert-dir=data/temp/converted
clipper.workspace.cut-dir=data/temp/fragments
clipper.workspace.cache-dir=data/library/cache
clipper.workspace.video-library-dir=data/library/videos
clipper.workspace.audio-library-dir=data/library/audios
clipper.workspace.render-output-dir=data/jobs

# Download configurations
clipper.download.dir=data/temp/downloads
clipper.download.cookies-path=${YOUTUBE_COOKIES_PATH:}
clipper.download.format=bestvideo[height<=720]+bestaudio/best

# Cloud Storage configurations
clipper.storage.type=gcs
clipper.storage.gcs.bucket=${GCS_BUCKET_NAME:julius-media-storage}
