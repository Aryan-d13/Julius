# ------------------------------------------------------------------------------
# Julius — Default Profile (Local Development via Docker Compose PostgreSQL)
# ------------------------------------------------------------------------------

# PostgreSQL connection (Docker Compose: make up)
spring.datasource.url=jdbc:postgresql://localhost:5432/julius
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=julius
spring.datasource.password=julius
spring.datasource.hikari.connection-init-sql=SET TIMEZONE TO 'UTC'
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway database migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seed

# Logging
logging.level.com.julius.clipper=DEBUG
spring.main.banner-mode=off

# ------------------------------------------------------------------------------
# Julius Custom Properties Defaults (Epic 4)
# ------------------------------------------------------------------------------

# Storage Configuration
clipper.storage.type=local
clipper.storage.local.root=data/storage
clipper.storage.gcs.bucket=

# Queue Configuration
clipper.queue.type=db
clipper.queue.redis.host=localhost
clipper.queue.redis.port=6379
clipper.queue.redis.password=

# AI Configuration
clipper.ai.gemini-api-key=default-dev-gemini-key
clipper.ai.gemini-model=gemini-1.5-flash
clipper.ai.whisper.model=large-v3-turbo
clipper.ai.whisper.python-path=python

# Telemetry Configuration
clipper.telemetry.env=dev
clipper.telemetry.otlp.endpoint=http://localhost:4318/v1/traces
clipper.telemetry.otlp.sampling-ratio=1.0

# Security Configuration
clipper.security.cors-enabled=false
clipper.security.allowed-origins=*

# Worker Concurrency Configurations
clipper.worker.io-concurrency-limit=8
clipper.worker.cpu-concurrency-limit=2
clipper.worker.gpu-concurrency-limit=1

